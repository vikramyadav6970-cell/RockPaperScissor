<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="box">
        <div id="heading">
        <h1>Press START! To Play Game</h1>
    </div>
    
    <div id="button">
        <select id="drop-down">
            <option value="choose">--Choose to Play--</option>
            <option value="rock">Rock</option>
            <option value="paper">Paper</option>
            <option value="scissor">Scissor</option>
        </select>
        <button id="btn">START</button>
    </div>

    <h1 id="message">Let's Start</h1>

    <div id="play">
        <img id="player-img">
        <img id="image">
    </div>
    <div id="option-selected-text">
        <h1 id="player-text"></h1>
        <h1 id="text"></h1>
    </div>
    <script src="index.js"></script>
</body>
</html>
